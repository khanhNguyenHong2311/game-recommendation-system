<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRS</title>  
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="../css/swiper-bundle.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.4.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <!--================== HEADER ==================-->

    <header class="header" id="header">
      <!------------ Animate ------------>
      <div class="blob-animate"></div>

      <!------------ Navigation container ------------>
      <nav class="nav container">
        <!-- Logo -->
        <a href="#" class="nav__logo">GRS</a>

        <!------------  Navigation ---------- -->
        <div class="nav__menu" id="nav-menu">
          <!-- List -->
          <ul class="nav__list">
            <li>
              <a href="index.html" class="nav__link">Home</a>
            </li>

            <li>
              <a href="discovery.html" class="nav__link">Discovery</a>
            </li>

            <li>
              <a href="#projects" class="nav__link">Genres</a>
            </li>

            <li>
              <a href="favorites.html" class="nav__link">Favorites</a>
            </li>

            <li>
              <a href="#contact" class="nav__link">Theme</a>
            </li>

          </ul>
        </div>
      </nav>

    </header>

    <!--================== MAIN ==================-->

    <main class="main">
      <section class="favorites section container">
 
        <!-- Breadcrumb -->
        <div class="favorites__breadcrumb">
            <a href="index.html">Home</a>
            <span>›</span>
            <span>Your Favorites</span>
        </div>
 
        <h1 class="favorites__title">Your Favorites</h1>
 
        <div class="favorites__layout">
            <!-- Left: Favorites list -->
            <div class="favorites__left">
            <div class="favorites__list-header">
                <span id="favCount">0 games</span>
                <button class="fav__clear-btn" onclick="clearAllFavorites()">
                <i class="fa-solid fa-trash"></i> Clear All
                </button>
            </div>
    
            <div id="favoritesList">
                <!-- Rendered by JS -->
            </div>
    
            <!-- Empty state -->
            <div class="favorites__empty" id="emptyState">
                <i class="fa-solid fa-heart-crack"></i>
                <p>No favorites yet.</p>
                <a href="discovery.html" class="fav__discover-btn">Discover Games</a>
            </div>
            
        </div>
 
        <!-- Right: Summary + Recommendations -->
        <div class="favorites__right">
 
          <!-- Summary box -->
          <div class="favorites__summary">
            <div class="summary__title">
              <i class="fa-solid fa-list"></i>
              Your List
            </div>
            <div id="summaryList"></div>
            <div class="summary__total">
              <span>Total</span>
              <span id="summaryCount">0 games</span>
            </div>
            <button class="fav__recommend-btn" onclick="loadRecommendations()">
              <i class="fa-solid fa-wand-magic-sparkles"></i>
              Get Recommendations
            </button>
          </div>
 
        </div>
      </div>
 
      <!-- Recommendations section -->
      <div class="favorites__recommendations" id="recommendationsSection" style="display:none;">
        <h2 class="favorites__rec-title">
          <i class="fa-solid fa-thumbs-up"></i>
          Recommended For You
        </h2>
        <p class="favorites__rec-subtitle">Based on your favorites list</p>
        <div id="recommendationsList"></div>
      </div>
 
    </section>
      
    </main>

    <!--================== PROJECTS ==================-->
    <section class="projects section" id="projects">

    </section>

    <!--================== ANIME JS ==================-->
    <script type="module" src="../javascript/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
    <script src="../javascript/split_text.js"></script>
    <script src="../javascript/swiper-bundle.min.js"></script>
    <script src="../javascript/swiper.js"></script>
    <script src="../javascript/search_bar.js"></script>
    <script src="../javascript/carousel.js"></script>
    <script src="../javascript/favorites.js"></script>
  </body>
</html>
