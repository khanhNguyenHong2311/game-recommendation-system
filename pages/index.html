<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRS</title>  
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="../css/swiper-bundle.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.4.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <!--================== HEADER ==================-->

    <header class="header" id="header">
      <!------------ Animate ------------>
      <div class="blob-animate"></div>

      <!------------ Navigation container ------------>
      <nav class="nav container">
        <!-- Logo -->
        <a href="#" class="nav__logo">GRS</a>

        <!------------  Navigation ---------- -->
        <div class="nav__menu" id="nav-menu">
          <!-- List -->
          <ul class="nav__list">
            <li>
              <a href="index.html" class="nav__link">Home</a>
            </li>

            <li>
              <a href="discovery.html" class="nav__link">Discovery</a>
            </li>

            <li>
              <a href="#projects" class="nav__link">Genres</a>
            </li>

            <li>
              <a href="#resume" class="nav__link">Favorites</a>
            </li>

            <li>
              <a href="#contact" class="nav__link">Theme</a>
            </li>

          </ul>
        </div>
      </nav>

    </header>

    <!--================== MAIN ==================-->

    <main class="main">
      <!--================== HOME SECTION ==================-->
      <section class="home section" id="home">
        <div class="home__top">
          
          <div class="home__data">
            <h3 class="home__greeting">Welcome to</h3>
            <h1 class="home__name">Smart Game <br />Recommendation System</h1>
          </div>

          <div class="search__wrapper">

            <div class="home__suggestion">
              <h3>Find Your Next Favorite</h3>
            </div>

            <div class="home__search">
              <input type="text" id="searchInput" placeholder="Search a game to get recommendations...">
              <button id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
            </div>

            <div id="searchDropdown"></div>
          </div>
        </div>



      </section>

      <!--================== ABOUT SECTION ==================-->
      <section class="about section" id="about">
        
      </section>
    </main>

    <!--================== PROJECTS ==================-->
    <section class="projects section" id="projects">
      <h2 class="section__title">
        Pick a Game<br /><span>We’ll Recommend Similar Ones</span>
      </h2>

      <div class="projects__container container grid">

        <h3 class="projects__type-title">Trending Now</h3>
        <div class="projects__swiper swiper swiper-popular">
          <div class="swiper-wrapper" id="carousel-popular"></div>
          <div class="swiper-pagination"></div>
        </div>


        <h3 class="projects__type-title">Best Free Games</h3>
          <div class="projects__swiper swiper swiper-free">
            <div class="swiper-wrapper" id="carousel-free"></div>
          <div class="swiper-pagination"></div>
        </div>


        <h3 class="projects__type-title">Play With Friends</h3>
        <div class="projects__swiper swiper swiper-multiplayer">
          <div class="swiper-wrapper" id="carousel-multiplayer"></div>
          <div class="swiper-pagination"></div>
        </div>


      </div>
    </section>

    <!--================== ANIME JS ==================-->
    <script type="module" src="../javascript/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
    <script src="../javascript/split_text.js"></script>
    <script src="../javascript/swiper-bundle.min.js"></script>
    <script src="../javascript/swiper.js"></script>
    <script src="../javascript/discovery.js"></script>
    <script src="../javascript/search_bar.js"></script>
    <script src="../javascript/carousel.js"></script>
  </body>
</html>
